data:
  avp_root: ~/datasets/AVP_Dataset/Personal
  lvt_root: ~/datasets/AVP-LVT/AVP-LVT_Dataset/LVT_Dataset
  manifest: data/manifest.csv
  splits: splits/avplvt_v1.json
frontend:
  sr: 24000
  resample_taps: 32
  resample_beta: 8.6
  resample_cutoff_scale: 0.94
  crop_pre_s: 0.025
  crop_post_s: 0.125
  n_fft: 600
  hop: 240
  n_mels: 64
  fmin: 0.0
  fmax: 12000.0
  log_floor_db: -50.0
  silence_emax: 1.0e-12
augment:
  onset_jitter_s: 0.020
  pitch_semitones: 1.5
  stretch_lo: 0.8
  stretch_hi: 1.2
  copies_per_event: 10
model:
  channels: [24, 48, 64, 96, 128]
  embedding_dim: 64
train:
  max_epochs: 50
  lr: 3.0e-4
  weight_decay: 1.0e-4
  batch_size: 128
  warmup_epochs: 5
  grad_clip: 1.0
  early_stop_patience: 8
  amp_dtype: bf16
prototypes:
  tau_grid: [0, 1, 2, 5, 10, 20]
  support_k: 5
  eval_draws: 100
seeds: [1729, 2718, 31415]
