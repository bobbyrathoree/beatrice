name: ci
on: [push, pull_request]
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build
      - run: npx vitest run
      - run: npm run lint:ipc
      # The jam e2e drives a fake microphone fed from test-audio/test-pattern.wav
      # (see playwright.config.ts). That directory is gitignored and generated on
      # demand, so a fresh CI checkout must build the fixtures before Playwright
      # runs — otherwise the fake device reads a missing file and detects silence
      # (0 events), failing the jam spec.
      - run: node scripts/generate-test-audio.mjs
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libasound2-dev
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # tauri::generate_context! embeds `frontendDist` (../dist) at compile time,
      # so the Rust lib (used by cargo test, clippy, and the bindings check) needs
      # the frontend built first on a fresh checkout.
      - run: npx vite build
      - run: node scripts/generate-test-audio.mjs
      # --workspace so the extracted `beatrice-dsp` crate (incl. the offline golden
      # freeze test) is built and tested alongside the native `beatrice` crate.
      # The crate's `wasm` feature is off by default and pkg/ is committed, so no
      # wasm32 target is needed here — this stays a host-target build.
      - run: cargo test --workspace --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --workspace --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: bindings freshness
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml export_bindings
          git diff --exit-code src/bindings.ts
