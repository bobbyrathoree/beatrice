name: deploy-demo
# Builds the browser-mock bundle and publishes it to GitHub Pages.
# In browser mode the Tauri API is aliased to src/utils/tauri-mock.ts, so the
# whole detect -> classify -> arrange -> play -> export pipeline runs client-side
# with a canned performance. GITHUB_PAGES=true switches vite to the /beatrice/
# subpath base.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Build browser-mock bundle
        run: npx vite build
        env:
          GITHUB_PAGES: "true"
      # SPA fallback: GitHub Pages serves 404.html for unknown paths; making it a
      # copy of index.html lets client routes (e.g. /jam-spike) and hard refreshes
      # resolve instead of showing Pages' default 404.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
